<!DOCTYPE html>

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achats</title>


<link rel="stylesheet" href="couleurs.css?v=11">
<link rel="stylesheet" href="style.css?v=11">


</head>

<body>

<div class="container">

<!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h2>🧾 Achats ETF</h2>
            <small>Journal d'exécution</small>
        </div>
        <div class="header-right">
            <a href="index.html" class="badge">← Retour</a>
        </div>
    </div>

<!-- TABLE -->
    <div class="card">
        <h3>Historique</h3>
        
                    <table>
                            <thead>
                                    <tr>
                                        <th>Date(s)</th>
                                        <th>Type</th>
                                        <th>Part(s)</th>
                                        <th>Montant(s)</th>
                                    </tr>
                            </thead>
                            <tbody id="table-achats"></tbody>
                    </table>
        
                      <div class="total-line">
                        <span>Total investi</span>
                        <span id="total-achats"></span>
                      </div>
    </div> 
</div> 


<script src="achats.js"></script>

<script>
// ===== HELPERS =====
function euro(v){
    return Math.round(v).toLocaleString('fr-BE') + " €";
}

// ===== COULEUR TYPE =====
function getClassByType(type){
    switch(type){
        case "ETF_MONDE": return "dot-monde";
        case "ETF_SENIOR": return "dot-seniors";
        case "ETF_JUNIOR": return "dot-juniors";
        default: return "";
    }
}

// ===== RENDER =====
function renderAchats(){

    const tbody = document.getElementById("table-achats");

    // tri DESC (plus récent en haut)
    const achatsETF = achats.filter(a => a.type.includes("ETF"));

    const sorted = achatsETF.sort((a,b)=>{
    return new Date(b.date.split("/").reverse().join("-")) 
         - new Date(a.date.split("/").reverse().join("-"));
    });

    tbody.innerHTML = "";
    sorted.forEach(a => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${a.date}</td>
            <td>
                <span class="dot ${getClassByType(a.type)}"></span>
                ${a.type.replace("ETF_", "")}
            </td>
            <td class="center">${a.parts || "-"}</td>
            <td class="amount">${euro(a.montant)}</td>
        `;

        tbody.appendChild(row);
    });

const total = sorted.reduce((sum, a) => sum + (a.montant || 0), 0);
document.getElementById("total-achats").innerText = euro(total);
    
}
renderAchats();


    
</script>
</body>
</html>
